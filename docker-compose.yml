name: quillcode-lean

services:
  # Ollama AI
  ollama:
    image: ollama/ollama:latest
    container_name: quillcode-lean-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - quillcode-lean-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quillcode-lean-backend
    restart: unless-stopped
    environment:
      - APP_MODE=prod
      - PORT=3000
      - DB_DATABASE=/app/data/code_notebook.sqlite
      - JWT_SECRET=48a287ab9497e852de30327444b0809e55d46466
      - JWT_EXPIRES_IN=7d
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3:8b
    ports:
      - "3001:3000"
    volumes:
      - sqlite_data:/app/data
    networks:
      - quillcode-lean-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quillcode-lean-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - quillcode-lean-network

volumes:
  sqlite_data:
    driver: local
  ollama_data:
    driver: local

networks:
  quillcode-lean-network:
    driver: bridge

